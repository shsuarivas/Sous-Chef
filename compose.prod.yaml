  services:
    frontend:
      build:
        context: ./Frontend
        dockerfile: Dockerfile.prod
      restart: unless-stopped
      env_file:
        - .env
      networks:
        - app-network

    backend:
      build:
        context: ./Backend
        dockerfile: Dockerfile
      restart: unless-stopped
      env_file:
        - .env
      environment:
        - NODE_ENV=production
        - PORT=${PORT}
        - DATABASE_URL=postgresql://SousChef:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      depends_on:
        postgres:
          condition: service_healthy
      networks:
        - app-network
    postgres:
      image: postgres:16-alpine
      restart: unless-stopped
      env_file:
        - .env
      environment:
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
      volumes:
        - postgres-data:/var/lib/postgresql/data
        - ./Backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U SousChef -d appdb"]
        interval: 5s
        timeout: 5s
        retries: 5
      networks:
        - app-network
        # nginx is added to mask the frontend and backend behind a single entry point.
    nginx:
      image: nginx:alpine
      restart: unless-stopped
      ports:
        - "80:80"
      volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      depends_on:
        - frontend
        - backend
      networks:
        - app-network
  volumes:
    postgres-data:

  networks:
    app-network:
      driver: bridge